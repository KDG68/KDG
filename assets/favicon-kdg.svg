<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Light Sky Blue to Violet Gradient -->
    <linearGradient id="kdg-sky-gradient-fav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80d8ff" /> <!-- Light Sky Blue -->
      <stop offset="50%" stop-color="#2979ff" /> <!-- Electric Blue -->
      <stop offset="100%" stop-color="#7c4dff" /> <!-- Tech Violet -->
    </linearGradient>
    <filter id="kdg-glow-fav" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 0)">
    <!-- Monogram KDG Tech Icon -->
    <!-- Letter G (Outer Loop) -->
    <path d="M26,10 C26,6 21,4 16,4 C9,4 4,9 4,16 C4,23 9,28 16,28 C21,28 26,26 26,20 L17,20" 
          fill="none" stroke="url(#kdg-sky-gradient-fav)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter D (Middle Loop) -->
    <path d="M10,8 C16,8 19,11 19,16 C19,21 16,24 10,24" 
          fill="none" stroke="#2979ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter K (Inner & Stem) -->
    <!-- Shared Vertical Stem for K and D -->
    <path d="M10,8 L10,24" 
          fill="none" stroke="#80d8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Diagonal branches of K -->
    <path d="M10,16 L16,10 M10,16 L16,22" 
          fill="none" stroke="#80d8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Circuit Connection Nodes (Glow Dots) -->
    <circle cx="26" cy="10" r="1.5" fill="#80d8ff" />
    <circle cx="17" cy="20" r="1.5" fill="#7c4dff" />
    <circle cx="16" cy="10" r="1.2" fill="#80d8ff" />
    <circle cx="16" cy="22" r="1.2" fill="#80d8ff" />
    
    <!-- Central Power Node -->
    <circle cx="10" cy="16" r="2" fill="#ffffff" filter="url(#kdg-glow-fav)" />
  </g>
</svg>
