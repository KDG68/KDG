<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <!-- Light Sky Blue to Violet Gradient -->
    <linearGradient id="kdg-sky-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80d8ff" /> <!-- Light Sky Blue -->
      <stop offset="50%" stop-color="#2979ff" /> <!-- Electric Blue -->
      <stop offset="100%" stop-color="#7c4dff" /> <!-- Tech Violet -->
    </linearGradient>
    <filter id="kdg-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(6, 4)">
    <!-- Monogram KDG Tech Icon -->
    <!-- Letter G (Outer Loop) -->
    <path d="M24,10 C24,7 20,5 15,5 C9,5 5,9 5,16 C5,23 9,27 15,27 C20,27 24,25 24,19 L16,19" 
          fill="none" stroke="url(#kdg-sky-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter D (Middle Loop) -->
    <path d="M10,9 C15,9 18,12 18,16 C18,20 15,23 10,23" 
          fill="none" stroke="#2979ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter K (Inner & Stem) -->
    <!-- Shared Vertical Stem for K and D -->
    <path d="M10,9 L10,23" 
          fill="none" stroke="#80d8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Diagonal branches of K -->
    <path d="M10,16 L15,11 M10,16 L15,21" 
          fill="none" stroke="#80d8ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Circuit Connection Nodes (Glow Dots) -->
    <circle cx="24" cy="10" r="1.5" fill="#80d8ff" />
    <circle cx="16" cy="19" r="1.5" fill="#7c4dff" />
    <circle cx="15" cy="11" r="1.2" fill="#80d8ff" />
    <circle cx="15" cy="21" r="1.2" fill="#80d8ff" />
    
    <!-- Central Power Node -->
    <circle cx="10" cy="16" r="2" fill="#ffffff" filter="url(#kdg-glow)" />
  </g>

  <!-- Logo text KDG -->
  <text x="50" y="27" font-family="'Outfit', 'Inter', 'Segoe UI', -apple-system, sans-serif" font-size="22" font-weight="900" fill="#ffffff" letter-spacing="1">KDG</text>
</svg>
